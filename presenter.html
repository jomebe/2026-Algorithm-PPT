<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>발표자 모드 (Presenter View) - 2026 알고리즘 프로젝트</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;850&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            overflow: auto;
            height: auto;
            display: block;
            padding: 24px;
        }
        .presenter-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .control-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 24px;
            position: sticky;
            top: 24px;
            height: fit-content;
        }
        .notes-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 36px;
        }
        .timer-box {
            font-size: 2.2rem;
            font-weight: 850;
            letter-spacing: -1px;
            margin: 12px 0;
            font-family: monospace;
            color: #0f172a;
        }
        .timer-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .timer-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
        }
        .timer-btn:hover {
            background: #e2e8f0;
        }
        .slide-navigator {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 20px;
        }
        .nav-btn-pres {
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            background: #0f172a;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .nav-btn-pres:hover {
            background: #1e293b;
        }
        .preview-box {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }
        .preview-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .preview-content {
            font-size: 0.95rem;
            font-weight: 700;
        }
        .speaker-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .badge-donghwa {
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }
        .badge-eunjae {
            background: #faf5ff;
            color: #6b21a8;
            border: 1px solid #e9d5ff;
        }
        .script-content {
            font-size: 1.15rem;
            line-height: 1.75;
            color: #334155;
            white-space: pre-wrap;
        }
        .script-slide-num {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="presenter-layout">
        
        <!-- Controls & Timer Panel -->
        <aside class="control-panel">
            <h2 style="font-size: 1rem; color: #64748b;">발표 진행 시간</h2>
            <div class="timer-box" id="elapsed-time">00:00</div>
            <div class="timer-controls">
                <button class="timer-btn" id="start-timer-btn">시작</button>
                <button class="timer-btn" id="stop-timer-btn">정지</button>
                <button class="timer-btn" id="reset-timer-btn">리셋</button>
            </div>

            <h2 style="font-size: 1rem; color: #64748b; margin-top: 20px;">슬라이드 조작</h2>
            <div class="slide-navigator">
                <button class="nav-btn-pres" id="pres-prev-btn">이전 (◀)</button>
                <button class="nav-btn-pres" id="pres-next-btn">다음 (▶)</button>
            </div>

            <div class="preview-box">
                <div class="preview-title">현재 슬라이드</div>
                <div class="preview-content" id="curr-slide-name">01. 타이틀</div>
            </div>
            
            <div class="preview-box">
                <div class="preview-title">다음 슬라이드</div>
                <div class="preview-content" id="next-slide-name" style="color: #64748b;">02. 개요: 기획 의도</div>
            </div>
        </aside>

        <!-- Script / Script Panel -->
        <main class="notes-panel">
            <div class="script-slide-num" id="script-slide-idx">SLIDE 01 / 12</div>
            <div id="speaker-badge-container">
                <span class="speaker-badge badge-donghwa">[동화 발표 파트]</span>
            </div>
            <div class="script-content" id="speaker-script">
                대본을 읽어오는 중입니다...
            </div>
        </main>

    </div>

    <script>
        // Slides titles and speaker notes mapping
        const slideNotes = [
            {
                title: "01. 타이틀",
                speaker: "동화",
                script: "안녕하세요. '인공지능을 활용한 랜덤 장애물 회피 게임 개발' 알고리즘 프로젝트 발표를 맡은 황동화, 유은재입니다. 발표를 시작하겠습니다."
            },
            {
                title: "02. 1. 프로젝트 개요: 기획 배경 및 메인 테마",
                speaker: "은재",
                script: "이 프로젝트는 학교 복도를 달리는 도중에 불규칙하게 다가오는 다른 학생들을 피하며 급식실로 도달하는 3D 러닝 게임입니다. 쿠키런의 회피 메커니즘을 모티브로 하여 기획했습니다."
            },
            {
                title: "03. 1. 개요: 인게임 그래픽 샷",
                speaker: "은재",
                script: "실제 구현된 3D 학교 복도의 모습입니다. 로우폴리 스타일로 모델링했으며, 캐릭터의 이동 속도에 비례해 카메라 시야각이 조율되도록 설계했습니다. 또한 장애물 충돌 시 Perlin Noise 기반의 화면 흔들림 효과로 타격감을 더했습니다."
            },
            {
                title: "04. 2. 시스템 설계: 아키텍처 및 구동 로직",
                speaker: "은재",
                script: "프로젝트의 전체 시스템 구성도와 흐름입니다. 플레이어 컨트롤러, NPC AI, 카메라 연출, 세이브 시스템 등 각 모듈을 독립적으로 구성했습니다. 매 프레임 속도와 물리 충돌을 감지하며, UI 활성화 시 조작을 자동 차단하는 예외 처리를 반영했습니다."
            },
            {
                title: "05. 3. 적용 자료구조/알고리즘: 핵심 자료구조 및 물리 제어",
                speaker: "동화",
                script: "핵심 상태 관리를 위해 무거운 FSM 대신 float 타이머 변수 연산을 채택해 CPU 연산량을 절감했습니다. 3D 충돌에는 AABB Box Collider를 사용하였으며, LERP 선형 보간을 활용해 NPC가 목적지까지 부드럽게 미끄러지듯 이동하게 구현했습니다."
            },
            {
                title: "06. 4. 핵심 알고리즘: BFS 기반 경로 탐색",
                speaker: "은재",
                script: "NPC들이 벽이나 사물함 같은 오브젝트에 멈추는 오작동을 해결하기 위해 BFS 알고리즘을 도입했습니다. 유니티의 3D 공간 좌표를 정수 격자 좌표로 실시간 변환하고, 벽이 있는 인덱스를 장애물로 인식해 자연스럽게 회피 최단 경로를 산출하도록 제작했습니다."
            },
            {
                title: "07. 5. 코드: NPC AI 및 오토스포너",
                speaker: "은재",
                script: "Obstacle.cs와 ObstacleSpawner.cs의 핵심 소스코드입니다. 플레이어와 NPC 사이의 sqrMagnitude 가시거리를 연산해, 시야 안에 들어온 NPC만 실시간 BFS를 동작하게 하여 병목 현상을 방지했습니다. 또한 스포너는 생성 전 오브젝트 거리를 체크해 겹침 현상을 방지합니다."
            },
            {
                title: "08. 6. 코드: Player & Camera",
                speaker: "동화",
                script: "PlayerController.cs와 FollowCamera.cs 소스코드입니다. 피격 시 무적 쿨타임을 적용해 연속 충돌 버그를 차단했습니다. 카메라는 단순 난수가 아닌 수학적으로 부드러운 Perlin Noise를 기반으로 흔들리게 설계하여 플레이어의 멀미를 방지하고 자연스러운 타격감을 주었습니다."
            },
            {
                title: "09. 7. 게임 시연 영상",
                speaker: "동화",
                script: "그럼 실제 게임 구동 시연 영상을 보겠습니다. 플레이어가 학교 복도를 달리며 불규칙하게 횡단하는 학생 NPC들을 점프와 슬라이딩으로 피하며 급식실 골인 지점으로 달려가는 모습을 확인하실 수 있습니다."
            },
            {
                title: "10. 8. 실행 결과 및 분석",
                speaker: "은재",
                script: "확률 기반 AI와 LERP 경로 보간이 결합되어 NPC들이 플레이어 진로를 유기적으로 방해하는 긴장감 높은 구도를 만들었습니다. 또한 매번 무작위로 탐색로가 재설정되기 때문에 암기 플레이를 차단하고 다회차 플레이 시에도 새로운 재미를 줍니다."
            },
            {
                title: "11. 9. 소감 및 역할 분담",
                speaker: "동화/은재",
                script: "역할 분담 및 소감입니다. 유은재는 NPC 가중치 결정, BFS 알고리즘 및 UI 기획을 담당했고 유니티 생태계를 배웠습니다. 황동화는 플레이어 주행 로직 및 카메라 흔들림을 구현하며 애니메이터와 코드 간의 유기적 맞물림을 깊이 이해하게 되었습니다."
            },
            {
                title: "12. 부록: AI 활용 & 저장소",
                speaker: "동화",
                script: "캐릭터 회전 및 애니메이터 마스킹 디버깅 단계에서 생성형 AI를 활용해 문제의 원인을 효율적으로 찾아 해결했습니다. 전체 소스코드는 GitHub 저장소에 올라가 있어 누구나 확인하고 실행해 보실 수 있습니다. 감사합니다."
            }
        ];

        // Communication channel
        const channel = new BroadcastChannel('presentation_channel');
        let currentSlideIdx = 0;

        function updatePresenterSlide(index) {
            if (index < 0 || index >= slideNotes.length) return;
            currentSlideIdx = index;
            
            const currentSlide = slideNotes[index];
            const nextSlide = slideNotes[index + 1] || { title: "발표 종료", speaker: "-", script: "-" };
            
            // UI updates
            document.getElementById('script-slide-idx').textContent = `SLIDE ${String(index + 1).padStart(2, '0')} / ${slideNotes.length}`;
            document.getElementById('curr-slide-name').textContent = currentSlide.title;
            document.getElementById('next-slide-name').textContent = nextSlide.title;
            document.getElementById('speaker-script').textContent = currentSlide.script;
            
            // Speaker badge update
            const badgeContainer = document.getElementById('speaker-badge-container');
            badgeContainer.innerHTML = '';
            
            const speakers = currentSlide.speaker.split('/');
            speakers.forEach(sp => {
                const badge = document.createElement('span');
                badge.className = `speaker-badge ${sp === '동화' ? 'badge-donghwa' : 'badge-eunjae'}`;
                badge.textContent = `[${sp} 발표 파트]`;
                badgeContainer.appendChild(badge);
            });
        }

        // Listener for change slide broadcasts from the main deck
        channel.onmessage = (event) => {
            if (event.data && typeof event.data.slideIndex === 'number') {
                updatePresenterSlide(event.data.slideIndex);
            }
        };

        // Click nav controls (Send messages back to the main deck window)
        document.getElementById('pres-prev-btn').addEventListener('click', () => {
            channel.postMessage({ action: 'prev' });
        });

        document.getElementById('pres-next-btn').addEventListener('click', () => {
            channel.postMessage({ action: 'next' });
        });

        // Keyboard navigation support in Presenter Window
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
                channel.postMessage({ action: 'next' });
            } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                channel.postMessage({ action: 'prev' });
            }
        });

        // Timer System
        let timerStart = 0;
        let timerInterval = null;
        let elapsed = 0;

        function startTimer() {
            if (timerInterval) return;
            timerStart = Date.now() - elapsed;
            timerInterval = setInterval(() => {
                elapsed = Date.now() - timerStart;
                const totalSec = Math.floor(elapsed / 1000);
                const min = Math.floor(totalSec / 60);
                const sec = totalSec % 60;
                document.getElementById('elapsed-time').textContent = 
                    `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
            }, 250);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        function resetTimer() {
            stopTimer();
            elapsed = 0;
            document.getElementById('elapsed-time').textContent = "00:00";
        }

        document.getElementById('start-timer-btn').addEventListener('click', startTimer);
        document.getElementById('stop-timer-btn').addEventListener('click', stopTimer);
        document.getElementById('reset-timer-btn').addEventListener('click', resetTimer);

        // Initial setup request to main slide deck
        channel.postMessage({ action: 'request_current' });

        // Default start slide 1
        updatePresenterSlide(0);
        startTimer();
    </script>
</body>
</html>
