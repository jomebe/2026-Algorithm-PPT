<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>발표자 모드 (Presenter View) - 2026 알고리즘 프로젝트</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;850&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            overflow: auto;
            height: auto;
            display: block;
            padding: 24px;
        }
        .presenter-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .control-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 24px;
            position: sticky;
            top: 24px;
            height: fit-content;
        }
        .notes-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 36px;
        }
        .timer-box {
            font-size: 2.2rem;
            font-weight: 850;
            letter-spacing: -1px;
            margin: 12px 0;
            font-family: monospace;
            color: #0f172a;
        }
        .timer-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .timer-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
        }
        .timer-btn:hover {
            background: #e2e8f0;
        }
        .slide-navigator {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 20px;
        }
        .nav-btn-pres {
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            background: #0f172a;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .nav-btn-pres:hover {
            background: #1e293b;
        }
        .preview-box {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }
        .preview-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .preview-content {
            font-size: 0.95rem;
            font-weight: 700;
        }
        .speaker-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .badge-donghwa {
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }
        .badge-eunjae {
            background: #faf5ff;
            color: #6b21a8;
            border: 1px solid #e9d5ff;
        }
        .script-content {
            font-size: 1.15rem;
            line-height: 1.75;
            color: #334155;
            white-space: pre-wrap;
        }
        .script-slide-num {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="presenter-layout">
        
        <!-- Controls & Timer Panel -->
        <aside class="control-panel">
            <h2 style="font-size: 1rem; color: #64748b;">발표 진행 시간</h2>
            <div class="timer-box" id="elapsed-time">00:00</div>
            <div class="timer-controls">
                <button class="timer-btn" id="start-timer-btn">시작</button>
                <button class="timer-btn" id="stop-timer-btn">정지</button>
                <button class="timer-btn" id="reset-timer-btn">리셋</button>
            </div>

            <h2 style="font-size: 1rem; color: #64748b; margin-top: 20px;">슬라이드 조작</h2>
            <div class="slide-navigator">
                <button class="nav-btn-pres" id="pres-prev-btn">이전 (◀)</button>
                <button class="nav-btn-pres" id="pres-next-btn">다음 (▶)</button>
            </div>

            <div class="preview-box">
                <div class="preview-title">현재 슬라이드</div>
                <div class="preview-content" id="curr-slide-name">01. 타이틀</div>
            </div>
            
            <div class="preview-box">
                <div class="preview-title">다음 슬라이드</div>
                <div class="preview-content" id="next-slide-name" style="color: #64748b;">02. 개요: 기획 의도</div>
            </div>
        </aside>

        <!-- Script / Script Panel -->
        <main class="notes-panel">
            <div class="script-slide-num" id="script-slide-idx">SLIDE 01 / 27</div>
            <div id="speaker-badge-container">
                <span class="speaker-badge badge-donghwa">[동화 발표 파트]</span>
            </div>
            <div class="script-content" id="speaker-script">
                대본을 읽어오는 중입니다...
            </div>
        </main>

    </div>

    <script>
        // Slides titles and speaker notes mapping
        const slideNotes = [
            {
                title: "01. 타이틀",
                speaker: "동화",
                script: "안녕하세요. '인공지능을 활용한 랜덤 장애물 회피 게임 개발' 알고리즘 프로젝트 발표를 맡은 황동화, 유은재입니다. 발표를 시작하겠습니다."
            },
            {
                title: "02. 개요: 기획 의도",
                speaker: "은재",
                script: "본 프로젝트는 학교 일상에서 영감을 얻었습니다. 많은 학생들이 붐비는 복도를 뚫고 목적지인 급식실로 달려가는 3D 러닝 회피 게임을 기획하게 되었습니다."
            },
            {
                title: "03. 개요: 메인 테마",
                speaker: "은재",
                script: "게임의 메인 기믹은 확률 기반으로 동작하는 NPC 학생들입니다. 고정형 장애물이 설치된 단조로운 레이스와 달리 실시간으로 횡단 경로를 틀어 플레이어의 주행을 가로막는 특징이 있습니다."
            },
            {
                title: "04. 개요: 선정 이유",
                speaker: "동화",
                script: "저희가 평소 좋아하고 즐겼던 '쿠키런'의 속도감 있는 스피드 제어감을 3D 환경에서 재현하고자 했습니다. 또한 비교적 공간 디자인 난이도가 익숙한 실제 학교 빌딩 구조를 모티브 삼아 친밀감을 올렸습니다."
            },
            {
                title: "05. 개요: 인게임 샷",
                speaker: "동화",
                script: "실제 구현된 3D 씬 빌드 샷입니다. 속도가 가속될수록 카메라 시야각(FOV)을 부드럽게 팽창시켜 씬 내에서의 극적인 속도감을 끌어냈습니다."
            },
            {
                title: "06. 설계: 모듈 구조",
                speaker: "은재",
                script: "전체 시스템 구조도입니다. 개발 결합도를 과감히 낮춰, 각 동작 모듈(플레이어 제어, NPC AI, 카메라 쉐이크, 파일 세이브)이 이벤트를 통해 비동기로 상호작용하도록 설계했습니다."
            },
            {
                title: "07. 설계: 주요 시스템",
                speaker: "동화",
                script: "플레이어 컨트롤러는 감도 값에 마우스 축을 연동했고, 볼륨 감도 등은 PlayerPrefs에 영구 저장되게 래핑했습니다. 카메라 역시 플레이어 속도를 관찰하여 FOV 가감속을 유연히 처리합니다."
            },
            {
                title: "08. 설계: 로직 흐름",
                speaker: "은재",
                script: "실제 전체 프레임 구동 로직입니다. 씬 내 설정창 UI가 활성화되어 있는 동안에는 사용자의 좌우/점프 인풋 입력을 차단해 안정성을 높였습니다."
            },
            {
                title: "09. 구조: 타이머 관리",
                speaker: "은재",
                script: "무거운 유한상태머신(FSM) 모듈을 정의하지 않았습니다. 대신 무적 시간이나 감속 디버프 주기를 float 변수로 매 프레임 deltaTime을 차감해 연산 연산 부담을 최소화했습니다."
            },
            {
                title: "10. 구조: AABB 충돌",
                speaker: "동화",
                script: "좌우 정렬된 3D 정육면체 충돌 판정인 AABB 기법을 탑재한 Unity BoxCollider를 적극 활용했습니다. 플레이어와 NPC 학생 간의 정확한 중첩 오버랩 연산을 실시간 수행합니다."
            },
            {
                title: "11. 구조: 가중치 행동 선택",
                speaker: "은재",
                script: "NPC들의 불규칙 무작위 배회를 위해 확률 가중치 행동 선택 방식을 적용했습니다. 특정 타이머 만료 주기에 다다를 때마다 내부 난수를 생성해 직진, 멈춤, 좌회전, 우회전 행동을 확률에 의거해 연산합니다."
            },
            {
                title: "12. 구조: 선형 보간 (Lerp)",
                speaker: "은재",
                script: "목표 좌표가 갱신됐을 때 적 오브젝트가 워프(텔레포트)되는 어색한 움직임을 개선하기 위해 Vector3.Lerp를 매 프레임 보간하여 부드럽고 자연스럽게 활보하도록 평활화했습니다."
            },
            {
                title: "13. 알고리즘: BFS 개요",
                speaker: "은재",
                script: "NPC가 복도 끝 사물함이나 방 벽 등의 벽면에 막혀 가만히 멈춰 서 있는 오작동을 차단하기 위해 격자 상에서 목적지까지 최단 경로를 우회해 탐색하는 BFS 알고리즘을 뼈대로 삼았습니다."
            },
            {
                title: "14. 알고리즘: 좌표 변환",
                speaker: "은재",
                script: "3D 월드 상의 실수형 벡터를 WorldToCell 정수형 인덱스로 매핑해 BFS를 연산한 다음, 산출된 최단경로 좌표들을 다시 CellToWorld를 이용해 월드 실수 waypoint로 되돌려 주행합니다."
            },
            {
                title: "15. 알고리즘: 다이어그램",
                speaker: "은재",
                script: "복도의 벽 인덱스를 bfsObstacles에 사전 등록하여 큐에 인접 노드를 집어넣는 도중 충돌 벽면을 스스로 인식하고 비껴 나가는 BFS 알고리즘의 진행 양상을 묘사한 흐름도입니다."
            },
            {
                title: "16. BFS 시뮬레이션",
                speaker: "은재",
                script: "실제 유니티 C# BFS 로직과 완전히 정렬되도록 작성한 실시간 자바스크립트 BFS 길찾기 시뮬레이션입니다. 목표를 재설정하면 장애물 벽을 피해 실시간으로 경로를 구축해 나가는 모습을 볼 수 있습니다."
            },
            {
                title: "17. 코드: Obstacle.cs",
                speaker: "은재",
                script: "Obstacle.cs 스크립트의 BFS 구현 부분입니다. 선입선출 구조의 큐(Queue)와 부모 추적용 Dictionary를 매칭하여 최단 경로 역추적 루프를 안정적으로 완결지었습니다."
            },
            {
                title: "18. 코드: Spawner.cs",
                speaker: "은재",
                script: "스포너 소스입니다. IsFarEnough 계산을 태워 새로이 스폰될 NPC 좌표와 이미 기존에 씬 내에 안착한 NPC들의 거리 제곱(sqrMagnitude)을 비교해 지나치게 오밀조밀 모이지 않게 차단합니다."
            },
            {
                title: "19. 코드: Player.cs",
                speaker: "동화",
                script: "플레이어 제어부 소스입니다. 충돌 시 hitCooldownTimer를 가동하여 연쇄 충돌 다단 피격을 원천 방지하고, 피격 충돌 시 카메라 진동 연출 함수를 호출하도록 결합했습니다."
            },
            {
                title: "20. 코드: FollowCamera.cs",
                speaker: "동화",
                script: "카메라 쉐이크 소스입니다. 단순 랜덤 오프셋은 미려하지 못하므로, 수학적으로 파동이 연속되는 PerlinNoise를 x, y 축에 조합해 타격 시 강하고 부드러운 카메라 진동 효과를 얻었습니다."
            },
            {
                title: "21. 카메라/피격 연출",
                speaker: "동화",
                script: "카메라 연출 테스트 샌드박스입니다. 가로 슬라이더를 올리면 시야각이 조절되는 입체적인 원근 스케일링을 미리 볼 수 있으며 충돌 트리거를 구동해 PerlinNoise 스크린 쉐이킹을 체험할 수 있습니다."
            },
            {
                title: "22. 분석: 동적 LERP",
                speaker: "은재",
                script: "알고리즘 분석 결과입니다. 무작위 타겟 가중치에 매끄러운 선형 LERP 보간을 가미한 결과, NPC 학생들이 플레이어가 달리는 메인 복도 한가운데로 불쑥 끼어드는 고도의 심리 주행 패턴을 완성했습니다."
            },
            {
                title: "23. 분석: 리플레이 가치",
                speaker: "은재",
                script: "게임 오버되어 스테이지를 리셋할 때마다 수십 개 NPC의 동작 루트가 실시간 다르게 재생성되므로, 주행 라인을 통째로 외워서 클리어하는 암기식 주행 지루함을 없애고 리플레이 가치를 높였습니다."
            },
            {
                title: "24. 분석: 플로우차트",
                speaker: "은재",
                script: "전체 프로그램 구동 플로우 차트입니다. 인풋 센싱부터 시작해 가속도, 피격 감속, 충돌, 라이프 감소, 사망 코루틴까지 엄밀하게 제어 흐름이 순환됩니다."
            },
            {
                title: "25. 소감: 팀원 소감",
                speaker: "은재/동화",
                script: "유은재: 유니티 3D 맵 빌드 공간 구조와 컴포넌트 생태계를 배운 유익한 시간이었습니다.\n황동화: 3D 캐릭터 모델과 복합 Animator 상태들이 코드와 맞물려 자연스레 CrossFade 연출을 뽑아내는 실체가 매우 신기했습니다."
            },
            {
                title: "26. 소감: 역할 분담",
                speaker: "동화/은재",
                script: "황동화는 맵 디자인 빌드와 플레이어 및 카메라 컨트롤러 쉐이크 물리 연산 코드를, 유은재는 맵 디자인 및 NPC BFS 최단 경로 알고리즘, 세이브 시스템, 그리고 최종 보고서 기술문서 구축을 완결했습니다."
            },
            {
                title: "27. 부록: AI 활용 & 저장소",
                speaker: "동화",
                script: "마우스 방향 회전 보정 및 유니티 Animator의 루트 모션 오버라이드 각도 버그 등 분석적인 디버깅 국면에서 AI의 탐색력을 큰 보조로 활용했습니다. 이상으로 발표를 마치겠습니다. 감사합니다."
            }
        ];

        // Communication channel
        const channel = new BroadcastChannel('presentation_channel');
        let currentSlideIdx = 0;

        function updatePresenterSlide(index) {
            if (index < 0 || index >= slideNotes.length) return;
            currentSlideIdx = index;
            
            const currentSlide = slideNotes[index];
            const nextSlide = slideNotes[index + 1] || { title: "발표 종료", speaker: "-", script: "-" };
            
            // UI updates
            document.getElementById('script-slide-idx').textContent = `SLIDE ${String(index + 1).padStart(2, '0')} / ${slideNotes.length}`;
            document.getElementById('curr-slide-name').textContent = currentSlide.title;
            document.getElementById('next-slide-name').textContent = nextSlide.title;
            document.getElementById('speaker-script').textContent = currentSlide.script;
            
            // Speaker badge update
            const badgeContainer = document.getElementById('speaker-badge-container');
            badgeContainer.innerHTML = '';
            
            const speakers = currentSlide.speaker.split('/');
            speakers.forEach(sp => {
                const badge = document.createElement('span');
                badge.className = `speaker-badge ${sp === '동화' ? 'badge-donghwa' : 'badge-eunjae'}`;
                badge.textContent = `[${sp} 발표 파트]`;
                badgeContainer.appendChild(badge);
            });
        }

        // Listener for change slide broadcasts from the main deck
        channel.onmessage = (event) => {
            if (event.data && typeof event.data.slideIndex === 'number') {
                updatePresenterSlide(event.data.slideIndex);
            }
        };

        // Click nav controls (Send messages back to the main deck window)
        document.getElementById('pres-prev-btn').addEventListener('click', () => {
            channel.postMessage({ action: 'prev' });
        });

        document.getElementById('pres-next-btn').addEventListener('click', () => {
            channel.postMessage({ action: 'next' });
        });

        // Keyboard navigation support in Presenter Window
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
                channel.postMessage({ action: 'next' });
            } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                channel.postMessage({ action: 'prev' });
            }
        });

        // Timer System
        let timerStart = 0;
        let timerInterval = null;
        let elapsed = 0;

        function startTimer() {
            if (timerInterval) return;
            timerStart = Date.now() - elapsed;
            timerInterval = setInterval(() => {
                elapsed = Date.now() - timerStart;
                const totalSec = Math.floor(elapsed / 1000);
                const min = Math.floor(totalSec / 60);
                const sec = totalSec % 60;
                document.getElementById('elapsed-time').textContent = 
                    `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
            }, 250);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        function resetTimer() {
            stopTimer();
            elapsed = 0;
            document.getElementById('elapsed-time').textContent = "00:00";
        }

        document.getElementById('start-timer-btn').addEventListener('click', startTimer);
        document.getElementById('stop-timer-btn').addEventListener('click', stopTimer);
        document.getElementById('reset-timer-btn').addEventListener('click', resetTimer);

        // Initial setup request to main slide deck
        channel.postMessage({ action: 'request_current' });

        // Default start slide 1
        updatePresenterSlide(0);
        startTimer();
    </script>
</body>
</html>
