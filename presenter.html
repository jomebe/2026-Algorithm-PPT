<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>발표자 모드 (Presenter View) - 2026 알고리즘 프로젝트</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;850&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            overflow: auto;
            height: auto;
            display: block;
            padding: 24px;
        }
        .presenter-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .control-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 24px;
            position: sticky;
            top: 24px;
            height: fit-content;
        }
        .notes-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 36px;
        }
        .timer-box {
            font-size: 2.2rem;
            font-weight: 850;
            letter-spacing: -1px;
            margin: 12px 0;
            font-family: monospace;
            color: #0f172a;
        }
        .timer-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .timer-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
        }
        .timer-btn:hover {
            background: #e2e8f0;
        }
        .slide-navigator {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 20px;
        }
        .nav-btn-pres {
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            background: #0f172a;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .nav-btn-pres:hover {
            background: #1e293b;
        }
        .preview-box {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }
        .preview-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .preview-content {
            font-size: 0.95rem;
            font-weight: 700;
        }
        .speaker-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .badge-donghwa {
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }
        .badge-eunjae {
            background: #faf5ff;
            color: #6b21a8;
            border: 1px solid #e9d5ff;
        }
        .script-content {
            font-size: 1.15rem;
            line-height: 1.75;
            color: #334155;
            white-space: pre-wrap;
        }
        .script-slide-num {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="presenter-layout">
        
        <!-- Controls & Timer Panel -->
        <aside class="control-panel">
            <h2 style="font-size: 1rem; color: #64748b;">발표 진행 시간</h2>
            <div class="timer-box" id="elapsed-time">00:00</div>
            <div class="timer-controls">
                <button class="timer-btn" id="start-timer-btn">시작</button>
                <button class="timer-btn" id="stop-timer-btn">정지</button>
                <button class="timer-btn" id="reset-timer-btn">리셋</button>
            </div>

            <h2 style="font-size: 1rem; color: #64748b; margin-top: 20px;">슬라이드 조작</h2>
            <div class="slide-navigator">
                <button class="nav-btn-pres" id="pres-prev-btn">이전 (◀)</button>
                <button class="nav-btn-pres" id="pres-next-btn">다음 (▶)</button>
            </div>

            <div class="preview-box">
                <div class="preview-title">현재 슬라이드</div>
                <div class="preview-content" id="curr-slide-name">01. 타이틀</div>
            </div>
            
            <div class="preview-box">
                <div class="preview-title">다음 슬라이드</div>
                <div class="preview-content" id="next-slide-name" style="color: #64748b;">02. 개요: 기획 의도</div>
            </div>
        </aside>

        <!-- Script / Script Panel -->
        <main class="notes-panel">
            <div class="script-slide-num" id="script-slide-idx">SLIDE 01 / 12</div>
            <div id="speaker-badge-container">
                <span class="speaker-badge badge-donghwa">[동화 발표 파트]</span>
            </div>
            <div class="script-content" id="speaker-script">
                대본을 읽어오는 중입니다...
            </div>
        </main>

    </div>

    <script>
        // Slides titles and speaker notes mapping
        const slideNotes = [
            {
                title: "01. 타이틀",
                speaker: "동화",
                script: "안녕하세요. '인공지능을 활용한 랜덤 장애물 회피 게임 개발' 알고리즘 프로젝트 발표를 맡은 황동화, 유은재입니다. 발표를 시작하겠습니다."
            },
            {
                title: "02. 개요: 기획 배경 및 메인 테마",
                speaker: "은재",
                script: "이 프로젝트는 학교 복도를 달리는 도중에 불규칙하게 다가오는 다른 학생들을 피하며 급식실로 도달하는 3D 러닝 게임입니다. 쿠키런의 회피 메커니즘을 모티브로 하였으며 확률 기반 NPC를 도입해 기획했습니다."
            },
            {
                title: "03. 설계: 시스템 아키텍처 및 구동 로직",
                speaker: "은재",
                script: "전체 모듈 구조와 제어 흐름입니다. 결합도를 최대한 낮춰 플레이어 컨트롤, NPC AI, 카메라 쉐이크, 세이브 모듈을 분할 구현했습니다. 오버레이 UI 상태나 사망 시에는 입력 감지를 차단하도록 프레임 루프를 설계했습니다."
            },
            {
                title: "04. 구조: 핵심 자료구조 및 물리 제어",
                speaker: "동화",
                script: "무거운 FSM 대신 float 변수 기반 타이머 구조를 이용해 캐릭터 상태를 가볍게 통제합니다. 또한 AABB 충돌 감지 연산과 가중치 기반 무작위 행동 난수 선택, Vector3.Lerp를 혼용한 선형 보간으로 부드러운 NPC 활보를 구현했습니다."
            },
            {
                title: "05. 알고리즘: BFS 기반 장애물 회피 경로 탐색",
                speaker: "은재",
                script: "NPC가 복도 구석이나 사물함 벽면에 끼는 버그를 방지하기 위해 BFS 최단경로 탐색 알고리즘을 설계했습니다. 3D 월드의 float 위치를 격자 정수 인덱스로 변환해 BFS를 실행하며, 복도 벽 인덱스를 감지하여 스스로 우회 주행합니다."
            },
            {
                title: "06. BFS 시뮬레이션: 알고리즘 작동 데모",
                speaker: "은재",
                script: "실제 유니티 C# BFS 연산을 자바스크립트로 구현한 데모입니다. '랜덤 목적지 탐색'을 클릭하면 실시간으로 BFS 경로를 계산하고 NPC가 LERP 보간 경로를 타고 부드럽게 주행하는 모습을 볼 수 있습니다."
            },
            {
                title: "07. 코드: NPC AI 및 오토스포너",
                speaker: "은재",
                script: "Obstacle.cs와 ObstacleSpawner.cs 스크립트 코드입니다. sqrMagnitude를 이용해 플레이어 가시거리 내의 NPC만 BFS 연산을 깨워 구동하게 최적화하였으며, 스폰 시에도 이미 배치된 객체들과의 거리를 검사해 겹침 버그를 차단합니다."
            },
            {
                title: "08. 코드: 플레이어 피격 및 카메라 셰이크",
                speaker: "동화",
                script: "PlayerController.cs와 FollowCamera.cs 소스입니다. 피격 시 무적 타이머를 부여해 연쇄 충돌을 방지하며, 3D 멀미 완화와 강한 타격감 연출을 위해 수학적으로 연속적인 Perlin Noise 함수 기반의 유기적 카메라 흔들림을 구현했습니다."
            },
            {
                title: "09. 카메라/피격 연출: 카메라 & 피격 샌드박스",
                speaker: "동화",
                script: "카메라 연출 테스트 샌드박스입니다. 달리기 속도에 비례하는 시야각(FOV) 변화와, 장애물 피격 시 스크린 좌표계에 미치는 Perlin Noise 흔들림 오프셋 효과를 직접 테스트할 수 있습니다."
            },
            {
                title: "10. 결과 및 분석: 알고리즘 동작 결과 및 분석",
                speaker: "은재",
                script: "선형 보간과 확률 AI가 맞물린 결과, NPC가 자연스럽게 통로로 끼어드는 긴장 구도를 연출했습니다. 게임 리셋 시마다 경로가 매번 다르게 재구축되므로 암기 플레이를 차단하고 다회차 플레이 가치를 증진시켰습니다."
            },
            {
                title: "11. 소감 및 역할: 수행 소감 및 역할 정리",
                speaker: "동화/은재",
                script: "유은재는 3D 배치 디자인과 NPC BFS AI를 코딩했고, 황동화는 플레이어 주행 및 카메라 쉐이크 물리 연산 스크립트를 구현했습니다. 은재는 유니티 컴포넌트 생태계를 체득했고, 동화는 애니메이터와 물리 코드 동기화를 배웠습니다."
            },
            {
                title: "12. 부록: AI 활용 및 저장소",
                speaker: "동화",
                script: "마우스 축 감도 보정 및 유니티 Animator가 임의로 회전값을 덮어써 캐릭터 각도가 뒤틀리던 물리 마스킹 버그 등을 디버깅하는 프로세스에서 AI의 도움을 받았습니다. 이상 발표를 마칩니다. 감사합니다."
            }
        ];

        // Communication channel
        const channel = new BroadcastChannel('presentation_channel');
        let currentSlideIdx = 0;

        function updatePresenterSlide(index) {
            if (index < 0 || index >= slideNotes.length) return;
            currentSlideIdx = index;
            
            const currentSlide = slideNotes[index];
            const nextSlide = slideNotes[index + 1] || { title: "발표 종료", speaker: "-", script: "-" };
            
            // UI updates
            document.getElementById('script-slide-idx').textContent = `SLIDE ${String(index + 1).padStart(2, '0')} / ${slideNotes.length}`;
            document.getElementById('curr-slide-name').textContent = currentSlide.title;
            document.getElementById('next-slide-name').textContent = nextSlide.title;
            document.getElementById('speaker-script').textContent = currentSlide.script;
            
            // Speaker badge update
            const badgeContainer = document.getElementById('speaker-badge-container');
            badgeContainer.innerHTML = '';
            
            const speakers = currentSlide.speaker.split('/');
            speakers.forEach(sp => {
                const badge = document.createElement('span');
                badge.className = `speaker-badge ${sp === '동화' ? 'badge-donghwa' : 'badge-eunjae'}`;
                badge.textContent = `[${sp} 발표 파트]`;
                badgeContainer.appendChild(badge);
            });
        }

        // Listener for change slide broadcasts from the main deck
        channel.onmessage = (event) => {
            if (event.data && typeof event.data.slideIndex === 'number') {
                updatePresenterSlide(event.data.slideIndex);
            }
        };

        // Click nav controls (Send messages back to the main deck window)
        document.getElementById('pres-prev-btn').addEventListener('click', () => {
            channel.postMessage({ action: 'prev' });
        });

        document.getElementById('pres-next-btn').addEventListener('click', () => {
            channel.postMessage({ action: 'next' });
        });

        // Keyboard navigation support in Presenter Window
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
                channel.postMessage({ action: 'next' });
            } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                channel.postMessage({ action: 'prev' });
            }
        });

        // Timer System
        let timerStart = 0;
        let timerInterval = null;
        let elapsed = 0;

        function startTimer() {
            if (timerInterval) return;
            timerStart = Date.now() - elapsed;
            timerInterval = setInterval(() => {
                elapsed = Date.now() - timerStart;
                const totalSec = Math.floor(elapsed / 1000);
                const min = Math.floor(totalSec / 60);
                const sec = totalSec % 60;
                document.getElementById('elapsed-time').textContent = 
                    `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
            }, 250);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        function resetTimer() {
            stopTimer();
            elapsed = 0;
            document.getElementById('elapsed-time').textContent = "00:00";
        }

        document.getElementById('start-timer-btn').addEventListener('click', startTimer);
        document.getElementById('stop-timer-btn').addEventListener('click', stopTimer);
        document.getElementById('reset-timer-btn').addEventListener('click', resetTimer);

        // Initial setup request to main slide deck
        channel.postMessage({ action: 'request_current' });

        // Default start slide 1
        updatePresenterSlide(0);
        startTimer();
    </script>
</body>
</html>
